# Publishes eval-quality to npmjs.org.
# Triggered manually: Actions > Publish Package > Run workflow > pick version type.
# Bumps version, builds, publishes, tags, and opens a PR back to main.
# Requires repo secret NPM_TOKEN (an npm automation token with publish rights).

name: Publish Package

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: 'Version type to bump'
        required: true
        default: 'patch'
        type: 'choice'
        options:
          - patch
          - minor
          - major
          - custom
      custom_version:
        description: 'Custom version (if version_type is "custom")'
        required: false
        type: 'string'

permissions:
  contents: write      # checkout + push branch/tag
  pull-requests: write # create PR

jobs:
  build-and-publish:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Validate inputs
        env:
          VERSION_TYPE: ${{ github.event.inputs.version_type }}
          CUSTOM_VERSION: ${{ github.event.inputs.custom_version }}
        run: |
          if [[ "$VERSION_TYPE" == "custom" && -z "$CUSTOM_VERSION" ]]; then
            echo "ERROR: custom_version must be provided when version_type=custom"
            exit 1
          fi

      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Calculate version
        id: version
        env:
          VERSION_TYPE: ${{ github.event.inputs.version_type }}
          CUSTOM_VERSION: ${{ github.event.inputs.custom_version }}
        run: |
          CURRENT_VERSION=$(npm pkg get version | tr -d '"')
          echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT

          if [[ "$VERSION_TYPE" == "custom" ]]; then
            NEW_VERSION="$CUSTOM_VERSION"
          else
            IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"
            PATCH_BASE="${PATCH%%-*}"
            if [[ "$VERSION_TYPE" == "major" ]]; then
              NEW_VERSION="$((MAJOR + 1)).0.0"
            elif [[ "$VERSION_TYPE" == "minor" ]]; then
              NEW_VERSION="$MAJOR.$((MINOR + 1)).0"
            else
              NEW_VERSION="$MAJOR.$MINOR.$((PATCH_BASE + 1))"
            fi
          fi

          if [[ "$NEW_VERSION" == "$CURRENT_VERSION" ]]; then
            echo "Version is already $NEW_VERSION, nothing to do."
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          npm version "$NEW_VERSION" --no-git-tag-version
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "release_branch=release/v$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Build package
        if: steps.version.outputs.skip != 'true'
        run: npm run build

      - name: Publish to npmjs.org
        if: steps.version.outputs.skip != 'true'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Verify publish
        if: steps.version.outputs.skip != 'true'
        run: |
          sleep 5
          npm view eval-quality@${{ steps.version.outputs.new_version }} version && echo "Verified on npmjs.org"

      - name: Create commit, tag, and release branch
        if: steps.version.outputs.skip != 'true'
        run: |
          git add package.json package-lock.json
          git commit -m "chore: bump version to ${{ steps.version.outputs.new_version }}"
          git tag -a "v${{ steps.version.outputs.new_version }}" -m "Release ${{ steps.version.outputs.new_version }}"
          git checkout -b "${{ steps.version.outputs.release_branch }}"
          git push origin "${{ steps.version.outputs.release_branch }}"
          git push origin "v${{ steps.version.outputs.new_version }}"

      - name: Create pull request
        if: steps.version.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --base main \
            --head "${{ steps.version.outputs.release_branch }}" \
            --title "chore: release v${{ steps.version.outputs.new_version }}" \
            --body "Bumps version to ${{ steps.version.outputs.new_version }}. Auto-generated by the publish workflow."
